build:
  id: "{cipher}"
  version: "{cipher}"
  name: "{cipher}"

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO #(TRACE, DEBUG, INFO, WARN, ERROR)
    com.info.configdemo.BuildInfoController: DEBUG
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7 # It stores them for 7 days
